name: Build, test & deploy

# Builds the site and deploys to GitHub Pages — but ONLY if validation and the full
# test suite pass first. A failing test blocks the deploy. Also refuses to deploy if a
# credential was ever committed to this public repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for committed secrets
        run: |
          if git ls-files | grep -v '.github/workflows/deploy.yml' | xargs -r grep -nIE \
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{20,}|sk-proj-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{32,}|gh[opsu]_[A-Za-z0-9]{36,}|AKIA[0-9A-Z]{16}' ; then
            echo "::error::A credential-like string was found in tracked files. Remove it and rotate the key."
            exit 1
          fi
          echo "No committed secrets found."

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # The deploy gate: validation + the full test suite must pass.
      - run: npm run validate
      - run: npm test
      - run: node scripts/build.mjs

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
