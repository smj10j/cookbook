name: Build, test & deploy

# Builds the site and deploys to GitHub Pages — but ONLY if validation and the full
# test suite pass first. A failing test blocks the deploy. Also refuses to deploy if a
# credential was ever committed to this public repo.
#
# A separate `photos` job generates AI photos for any recipe missing one and opens a PR
# with them (it cannot push to protected `main` directly — the ruleset requires a PR you
# approve). Merging that PR triggers a fresh deploy that attaches the new heroes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for committed secrets
        run: |
          if git ls-files | grep -v '.github/workflows/deploy.yml' | xargs -r grep -nIE \
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{20,}|sk-proj-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{32,}|gh[opsu]_[A-Za-z0-9]{36,}|AKIA[0-9A-Z]{16}' ; then
            echo "::error::A credential-like string was found in tracked files. Remove it and rotate the key."
            exit 1
          fi
          echo "No committed secrets found."

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # The deploy gate: validation + the full test suite must pass.
      - run: npm run validate
      - run: npm test
      - run: node scripts/build.mjs

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Cheap, dependency-free pre-flight: is any recipe/drink missing its photo, or any
  # photo its OG preview? Pure bash on the checkout — no npm ci, no apt installs — so the
  # common "nothing's missing" case costs seconds. Mirrors generate-photos.mjs /
  # og-images.mjs (slug == filename; _preview -> _home). Gates the expensive `photos` job.
  photos-check:
    runs-on: ubuntu-latest
    outputs:
      work: ${{ steps.check.outputs.work }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          work=false
          for f in recipes/*.md drinks/*.md; do
            [ -e "$f" ] || continue
            [ -e "docs/images/$(basename "$f" .md).webp" ] || { work=true; break; }
          done
          if [ "$work" = false ]; then
            for w in docs/images/*.webp; do
              [ -e "$w" ] || continue
              slug=$(basename "$w" .webp); name=$slug
              [ "$slug" = _preview ] && name=_home
              [ -e "docs/og/$name.jpg" ] || { work=true; break; }
            done
          fi
          echo "Photos/OG generation needed: $work"
          echo "work=$work" >> "$GITHUB_OUTPUT"

  # Generate AI photos + OG previews for any recipe/drink missing one, push them to a
  # branch, and open a PR with them. Skipped entirely when photos-check finds nothing to
  # do (so no installs run). We do NOT push to `main` (the ruleset requires a PR you
  # approve) — instead CI opens the PR for you to approve + merge; merging triggers a
  # fresh deploy that attaches the new heroes. Runs independently of the deploy gate — a
  # photo hiccup never blocks publishing.
  #
  # NOTE: opening a PR with the built-in GITHUB_TOKEN requires the repo/org setting
  # "Allow GitHub Actions to create and approve pull requests" (Settings → Actions →
  # General → Workflow permissions). If it's disabled, PR creation fails and we fall back
  # to surfacing a one-click compare link in the run summary instead.
  photos:
    needs: photos-check
    if: needs.photos-check.outputs.work == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the ci/photos-* branch (NOT main, which the ruleset protects)
      pull-requests: write   # open the PR for those photos
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Install image tools (cwebp for photos, ImageMagick for OG)
        run: sudo apt-get update && sudo apt-get install -y webp imagemagick

      - name: Generate photos for recipes missing one
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-photos.mjs

      - name: Generate OG link-preview images for any new photos
        run: node scripts/og-images.mjs

      - name: Push a branch + open a PR if any photos were generated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain docs/images docs/og)" ]; then
            echo "No new photos — nothing to do." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          branch="ci/photos-${{ github.run_id }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add docs/images docs/og
          git commit -m "Add AI-generated photos + OG previews for recipes missing one"
          git push origin "$branch"

          title="📸 Add AI-generated photos + OG previews for recipes missing one"
          body=$'CI generated recipe photos + OG link-preview images on this branch.\n\nReview the images, then approve + merge — the next deploy attaches them as recipe heroes.\n\n_Opened automatically by the `photos` job._'

          # Try to open the PR with the built-in token. This needs the repo/org setting
          # "Allow GitHub Actions to create and approve pull requests"; if it's off, gh
          # fails and we fall back to a one-click compare link.
          if pr_url=$(gh pr create --base main --head "$branch" --title "$title" --body "$body" 2>pr_err); then
            {
              echo "### 📸 New recipe photos — PR opened"
              echo ""
              echo "**[→ Review the PR]($pr_url)**"
              echo ""
              echo "Approve + merge and the next deploy attaches them as recipe heroes."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Could not auto-create the PR (is 'Allow GitHub Actions to create and approve pull requests' enabled?). Falling back to a compare link."
            cat pr_err
            url="${{ github.server_url }}/${{ github.repository }}/compare/main...$branch?expand=1"
            {
              echo "### 📸 New recipe photos ready for review"
              echo ""
              echo "CI generated photos on branch \`$branch\` but couldn't open the PR automatically."
              echo "Enable **Settings → Actions → General → Allow GitHub Actions to create and approve pull requests**, or open it manually:"
              echo ""
              echo "**[→ Open a PR to publish them]($url)**"
              echo ""
              echo "Approve + merge and the next deploy attaches them as recipe heroes."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
