name: Build & guard

# Rebuilds docs/recipes.json from the recipe files on every relevant push so the
# published site always matches the source — even for edits made on github.com.
# Also fails if an API key ever gets committed to this public repo.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'recipes/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for committed secrets
        run: |
          # Look for real-length credential patterns in tracked files (excluding this workflow).
          if git ls-files | grep -v '.github/workflows/build.yml' | xargs -r grep -nIE \
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{20,}|sk-proj-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{32,}|gh[opsu]_[A-Za-z0-9]{36,}|AKIA[0-9A-Z]{16}' ; then
            echo "::error::A credential-like string was found in tracked files. Remove it and rotate the key."
            exit 1
          fi
          echo "No committed secrets found."

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Commit rebuilt recipes.json if it changed
        run: |
          if ! git diff --quiet docs/recipes.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/recipes.json
            git commit -m "build: sync recipes.json [skip ci]"
            git push
          else
            echo "recipes.json already in sync."
          fi
